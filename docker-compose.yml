services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      TRAMPLIN_DATABASE_PATH: /data/tramplin.db
      TRAMPLIN_SECRET_KEY: ${TRAMPLIN_SECRET_KEY:-change_me_on_vps}
      TRAMPLIN_ADMIN_EMAIL: ${TRAMPLIN_ADMIN_EMAIL:-}
      TRAMPLIN_ADMIN_PASSWORD: ${TRAMPLIN_ADMIN_PASSWORD:-}
      TRAMPLIN_ADMIN_NAME: ${TRAMPLIN_ADMIN_NAME:-}
      YANDEX_GEOCODER_API_KEY: ${YANDEX_GEOCODER_API_KEY:-}
    volumes:
      - tramplin_backend_data:/data
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_YANDEX_MAPS_API_KEY: ${VITE_YANDEX_MAPS_API_KEY:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  tramplin_backend_data:
