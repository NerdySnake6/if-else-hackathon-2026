map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_user_agent $is_bot {
    default 0;
    ~*(googlebot|bingbot|yandexbot|vkshare|telegrambot|twitterbot|slurp|duckduckbot|baiduspider) 1;
}

map $host $tramplin_csp {
    default "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://cdn.jsdelivr.net https://mc.yandex.ru https://api-maps.yandex.ru https://yastatic.net https://*.yastatic.net https://yandex.st https://*.yandex.st https://yandexmetrica.com https://*.yandexmetrica.com https://webvisor.org https://*.webvisor.org https://yandex.ru https://*.yandex.ru https://*.yandex.net https://*.yandex.com https://*.yandex.com.tr https://*.yandex.kz https://*.yandex.by https://*.yandex.uz https://*.yandex.tj https://*.yandex.az; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://api-maps.yandex.ru https://yastatic.net https://*.yastatic.net https://yandex.st https://*.yandex.st https://yandex.ru https://*.yandex.ru https://*.yandex.net https://*.yandex.com https://*.yandex.com.tr https://*.yandex.kz https://*.yandex.by https://*.yandex.uz https://*.yandex.tj https://*.yandex.az; img-src 'self' data: blob: https://mc.yandex.ru https://yastatic.net https://*.yastatic.net https://yandex.st https://*.yandex.st https://yandexmetrica.com https://*.yandexmetrica.com https://webvisor.org https://*.webvisor.org https://yandex.ru https://*.yandex.ru https://*.yandex.net https://*.yandex.com https://*.yandex.com.tr https://*.yandex.kz https://*.yandex.by https://*.yandex.uz https://*.yandex.tj https://*.yandex.az; font-src 'self' data: https://cdn.jsdelivr.net https://yastatic.net https://*.yastatic.net; connect-src 'self' https://cdn.jsdelivr.net https://mc.yandex.ru wss://mc.yandex.ru wss://*.yandex.ru wss://*.webvisor.com wss://*.webvisor.org https://yastatic.net https://*.yastatic.net https://yandex.st https://*.yandex.st https://yandexmetrica.com https://*.yandexmetrica.com https://webvisor.org https://*.webvisor.org https://yandex.ru https://*.yandex.ru https://*.yandex.net https://*.yandex.com https://*.yandex.com.tr https://*.yandex.kz https://*.yandex.by https://*.yandex.uz https://*.yandex.tj https://*.yandex.az; frame-src 'self' https://mc.yandex.ru https://yandexmetrica.com https://*.yandexmetrica.com https://webvisor.org https://*.webvisor.org https://yandex.ru https://*.yandex.ru https://*.yandex.net https://*.yandex.com https://*.yandex.com.tr https://*.yandex.kz https://*.yandex.by https://*.yandex.uz https://*.yandex.tj https://*.yandex.az; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests";
}

limit_req_zone $tramplin_auth_limit_key zone=tramplin_auth_actions:10m rate=5r/m;

server {
    listen 80;
    server_name tramplin.site www.tramplin.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name tramplin.site www.tramplin.site;

    ssl_certificate /etc/letsencrypt/live/tramplin.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tramplin.site/privkey.pem;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=15552000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy $tramplin_csp always;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    location /assets/ {
        try_files $uri =404;
        add_header Strict-Transport-Security "max-age=15552000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        add_header Content-Security-Policy $tramplin_csp always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Security-Policy $tramplin_csp always;
        try_files $uri =404;
    }

    location /api/ {
        set $tramplin_auth_limit_key "";
        if ($request_uri ~* "/api/auth/(login|register|reset-password|verify-email)") {
            set $tramplin_auth_limit_key $binary_remote_addr;
        }

        limit_req zone=tramplin_auth_actions burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSR for SEO bots
    location ~ ^/opportunities/([0-9]+)$ {
        set $opp_id $1;
        error_page 418 = @ssr;
        if ($is_bot) {
            return 418;
        }
        try_files $uri /index.html;
    }

    location @ssr {
        proxy_pass http://backend:8000/seo/opportunities/$opp_id;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }
}
