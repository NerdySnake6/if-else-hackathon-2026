map $http_user_agent $is_bot {
    default 0;
    ~*(googlebot|bingbot|yandexbot|vkshare|telegrambot|twitterbot|slurp|duckduckbot|baiduspider) 1;
}

map $host $tramplin_csp {
    default "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://mc.yandex.ru https://api-maps.yandex.ru https://yastatic.net https://*.yastatic.net https://yandex.st https://*.yandex.st https://yandexmetrica.com https://*.yandexmetrica.com https://webvisor.org https://*.webvisor.org https://*.yandex.ru https://*.yandex.net https://*.yandex.com https://*.yandex.com.tr https://*.yandex.kz https://*.yandex.by https://*.yandex.uz https://*.yandex.tj https://*.yandex.az; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://api-maps.yandex.ru https://yastatic.net https://*.yastatic.net https://yandex.st https://*.yandex.st https://*.yandex.ru https://*.yandex.net https://*.yandex.com https://*.yandex.com.tr https://*.yandex.kz https://*.yandex.by https://*.yandex.uz https://*.yandex.tj https://*.yandex.az; img-src 'self' data: blob: https://mc.yandex.ru https://yastatic.net https://*.yastatic.net https://yandex.st https://*.yandex.st https://yandexmetrica.com https://*.yandexmetrica.com https://webvisor.org https://*.webvisor.org https://*.yandex.ru https://*.yandex.net https://*.yandex.com https://*.yandex.com.tr https://*.yandex.kz https://*.yandex.by https://*.yandex.uz https://*.yandex.tj https://*.yandex.az; font-src 'self' data: https://cdn.jsdelivr.net https://yastatic.net https://*.yastatic.net; connect-src 'self' https://mc.yandex.ru https://yastatic.net https://*.yastatic.net https://yandex.st https://*.yandex.st https://yandexmetrica.com https://*.yandexmetrica.com https://webvisor.org https://*.webvisor.org https://*.yandex.ru https://*.yandex.net https://*.yandex.com https://*.yandex.com.tr https://*.yandex.kz https://*.yandex.by https://*.yandex.uz https://*.yandex.tj https://*.yandex.az; frame-src 'self' https://mc.yandex.ru https://yandexmetrica.com https://*.yandexmetrica.com https://webvisor.org https://*.webvisor.org https://*.yandex.ru https://*.yandex.net https://*.yandex.com https://*.yandex.com.tr https://*.yandex.kz https://*.yandex.by https://*.yandex.uz https://*.yandex.tj https://*.yandex.az; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests";
}

server {
    listen 80;
    server_name www.tramplin.site;
    server_tokens off;

    return 301 https://tramplin.site$request_uri;
}

server {
    listen 80;
    server_name tramplin.site;
    server_tokens off;

    return 301 https://tramplin.site$request_uri;
}

server {
    listen 443 ssl;
    server_name www.tramplin.site;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/tramplin.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tramplin.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=15552000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy $tramplin_csp always;

    return 301 https://tramplin.site$request_uri;
}

server {
    listen 443 ssl;
    server_name tramplin.site;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/tramplin.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tramplin.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=15552000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy $tramplin_csp always;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        add_header Strict-Transport-Security "max-age=15552000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        add_header Content-Security-Policy $tramplin_csp always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /sw.js {
        return 410;
    }

    location = /robots.txt {
        proxy_pass http://backend:8000/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sitemap.xml {
        proxy_pass http://backend:8000/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/docs {
        return 404;
    }

    location = /api/redoc {
        return 404;
    }

    location = /api/openapi.json {
        return 404;
    }

    location = /openapi.json {
        return 404;
    }

    location = /api {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/opportunities/([0-9]+)$ {
        set $opp_id $1;
        error_page 418 = @ssr;
        if ($is_bot) {
            return 418;
        }
        try_files $uri /index.html;
    }

    location @ssr {
        proxy_pass http://backend:8000/seo/opportunities/$opp_id;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
