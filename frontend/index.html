<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трамплин – Карьерная платформа</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Собственные стили -->
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="app">
        <!-- Навигация -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="#">Трамплин</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="loginBtn">Вход</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="registerBtn">Регистрация</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Основной контент: карта и список -->
        <div class="container mt-4">
            <div class="row">
                <!-- Левая колонка: карта -->
                <div class="col-md-7 mb-3">
                    <h4>Карта возможностей</h4>
                    <div id="map" style="height: 500px;"></div>
                </div>
                <!-- Правая колонка: список -->
                <div class="col-md-5">
                    <h4>Список возможностей</h4>
                    <div id="opportunities-list" class="list-group" style="max-height: 500px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (для работы навигации) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Наш главный скрипт (type="module" чтобы работали импорты) -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
